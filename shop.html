<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كشف حساب المحل</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', sans-serif; }
  @media print {
    .no-print { display: none !important; }
    body { background: white !important; }
  }
</style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

<div class="max-w-2xl mx-auto p-4 sm:p-8">
  <div id="loadingBox" class="text-center py-20">
    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto"></div>
    <p class="mt-4 text-gray-500">جارٍ تحميل كشف الحساب...</p>
  </div>

  <div id="errorBox" class="hidden text-center py-20">
    <i class="fas fa-exclamation-triangle text-4xl text-red-400 mb-4"></i>
    <p class="text-gray-600" id="errorText">تعذر تحميل كشف الحساب.</p>
  </div>

  <div id="statementBox" class="hidden space-y-6">
    <div class="flex items-center justify-between no-print">
      <img src="logo.png" alt="Logo" class="h-12 w-12 object-cover rounded-lg">
      <button onclick="window.print()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">
        <i class="fas fa-print ml-2"></i>طباعة
      </button>
    </div>

    <div class="bg-white rounded-xl shadow-sm p-6 text-center">
      <h1 class="text-xl font-bold" id="shopName">—</h1>
      <p class="text-sm text-gray-500 mt-1" id="shopMeta">—</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm p-6 text-center">
      <p class="text-sm text-gray-500">الرصيد المستحق حاليًا</p>
      <p class="text-3xl font-bold mt-1" id="balanceAmount">$0.00</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <div class="p-4 border-b border-gray-100 font-semibold">سجل الطلبات</div>
      <div id="salesTableWrap"></div>
    </div>

    <div id="paymentsSection" class="hidden bg-white rounded-xl shadow-sm overflow-hidden">
      <div class="p-4 border-b border-gray-100 font-semibold">سجل الدفعات</div>
      <div id="paymentsTableWrap"></div>
    </div>

    <p class="text-center text-xs text-gray-400 no-print">تم إنشاء هذا الكشف تلقائيًا من <span id="warehouseName">—</span></p>
  </div>
</div>

<script src="config.js"></script>
<script>
function fmt(n) { return '$' + Number(n).toFixed(2); }
function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

async function loadStatement() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (!token) {
    document.getElementById('loadingBox').classList.add('hidden');
    document.getElementById('errorBox').classList.remove('hidden');
    return;
  }

  try {
    const res = await fetch(API_BASE + '/public/shop-statement/' + encodeURIComponent(token));
    if (!res.ok) throw new Error('not found');
    const data = await res.json();

    document.getElementById('shopName').textContent = data.shop.name;
    document.getElementById('shopMeta').textContent = [data.shop.phone, data.shop.location].filter(Boolean).join(' · ') || '—';
    document.getElementById('warehouseName').textContent = data.shop.warehouse_name || '';

    const balanceEl = document.getElementById('balanceAmount');
    balanceEl.textContent = fmt(data.shop.credit_balance);
    balanceEl.className = 'text-3xl font-bold mt-1 ' + (data.shop.credit_balance > 0 ? 'text-orange-600' : 'text-green-600');

    const salesWrap = document.getElementById('salesTableWrap');
    if (data.sales.length === 0) {
      salesWrap.innerHTML = '<p class="p-6 text-center text-gray-400 text-sm">لا توجد طلبات بعد</p>';
    } else {
      salesWrap.innerHTML = `
        <table class="w-full text-sm">
          <thead class="bg-gray-50"><tr class="text-right text-gray-500">
            <th class="p-3">التاريخ</th><th class="p-3">الأصناف</th><th class="p-3">الدفع</th><th class="p-3 text-left">الإجمالي</th>
          </tr></thead>
          <tbody>
            ${data.sales.map(s => `
            <tr class="border-b border-gray-50">
              <td class="p-3 text-gray-500">${new Date(s.created_at).toLocaleDateString('ar')}</td>
              <td class="p-3">${s.items.map(i => esc(i.product_name) + ' ×' + i.quantity).join('، ')}</td>
              <td class="p-3">${s.payment_method === 'credit' ? 'آجل' : 'نقدًا'}</td>
              <td class="p-3 text-left font-medium">${fmt(s.total_amount)}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    }

    if (data.payments.length > 0) {
      document.getElementById('paymentsSection').classList.remove('hidden');
      document.getElementById('paymentsTableWrap').innerHTML = `
        <table class="w-full text-sm">
          <thead class="bg-gray-50"><tr class="text-right text-gray-500">
            <th class="p-3">التاريخ</th><th class="p-3">ملاحظة</th><th class="p-3 text-left">المبلغ</th>
          </tr></thead>
          <tbody>
            ${data.payments.map(p => `
            <tr class="border-b border-gray-50">
              <td class="p-3 text-gray-500">${new Date(p.created_at).toLocaleDateString('ar')}</td>
              <td class="p-3">${esc(p.note || '-')}</td>
              <td class="p-3 text-left text-green-600 font-medium">${fmt(p.amount)}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    }

    document.getElementById('loadingBox').classList.add('hidden');
    document.getElementById('statementBox').classList.remove('hidden');
  } catch (err) {
    document.getElementById('loadingBox').classList.add('hidden');
    document.getElementById('errorBox').classList.remove('hidden');
  }
}

loadStatement();
</script>
</body>
</html>
